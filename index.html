<!DOCTYPE html>
<html lang="zh">

<head>

  <meta charset="UTF-8">

  <title>SearchWUT</title>

  <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="app">

  <h1 class="title">SearchWUT</h1>


  <!-- 校园资讯 -->
  <div class="section">

    <h2>🏫 校园资讯</h2>

    <div id="news-list"></div>

  </div>


  <!-- URL分析 -->
  <div class="section">

    <h2>🌐 URL网页分析</h2>

    <div class="search-box">

      <input
        id="url-input"
        type="text"
        placeholder="输入网页URL"
      >

      <button onclick="analyzeUrl()">
        分析
      </button>

    </div>

    <div id="url-result"></div>

  </div>


  <!-- AI聊天 -->
  <div class="section">

    <h2>🤖 AI聊天</h2>

    <div class="search-box">

      <input
        id="chat-input"
        type="text"
        placeholder="输入问题"
      >

      <button onclick="sendMessage()">
        发送
      </button>

    </div>

    <div id="chat-box"></div>

  </div>


  <!-- 页脚 -->
  <footer>

    <p>👨‍💻 Nitro0607</p>

    <p>
      📧
      <a href="mailto:1295422173@qq.com">
        1295422173@qq.com
      </a>
    </p>

    <p>
      💻
      <a href="https://github.com/nitro0607">
        GitHub
      </a>
    </p>

  </footer>

</div>

<script src="/static/script.js"></script>

</body>
</html>
