<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>SearchWUT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <h1 class="title">SearchWUT</h1>

  <div class="search-box">
    <input id="input" type="text" placeholder="输入网页url或你的问题..." />
    <button onclick="search()">搜索</button>
  </div>

  <div id="result" class="result-card"></div>

  <footer>
    <p><strong>🌐 AI智能搜索引擎</strong></p>

    <p>👨‍💻 Nitro0607</p>

    <p>
      📧 Email：
      <a href="mailto:1295422173@qq.com">1295422173@qq.com</a>
    </p>

    <p>
      💻 GitHub：
      <a href="https://github.com/nitro0607" target="_blank">
        https://github.com/nitro0607
      </a>
    </p>

    <p style="margin-top:10px; color:#888;">
      © 2026 All Rights Reserved
    </p>
  </footer>

</div>

<!-- ✅ 直接内嵌 JS（避免 script.js 路径问题） -->
<script>
async function search() {
  const input = document.getElementById("input").value.trim();
  const resultDiv = document.getElementById("result");

  if (!input) {
    resultDiv.innerText = "⚠️ 请输入内容";
    return;
  }

  // ✅ loading 状态
  resultDiv.innerText = "🧠 AI正在思考中...\n\n";

  try {
    const res = await fetch("https://test-1-5r5k.onrender.com/api/summarize", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ url: input })
    });

    if (!res.ok) {
      resultDiv.innerText = "❌ 服务器错误：" + res.status;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder("utf-8");

    // 清空再开始流式写入
    resultDiv.innerText = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      resultDiv.innerText += chunk;
    }

  } catch (err) {
    resultDiv.innerText = "❌ 请求失败，请检查后端或网络";
  }
}
</script>

</body>
</html>
